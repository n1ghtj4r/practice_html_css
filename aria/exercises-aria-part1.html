<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="Rubiks cube">

    </section>
    <section>
        <h2>Payment Information</h2>
        <form>
            <label for="card-name"><span aria-hidden="true">*</span>Name</label>
            <input type="text" id="card-name" name="card-name" required>

            <label for="card-number"><span aria-hidden="true">*</span>Number</label>
            <input type="text" id="card-number" name="card-number" required value="0905123456" aria-describedby="card-number-help">

            <p id="card-number-help">help for number</p>

        </form>

    </section>
</body>

</html>
