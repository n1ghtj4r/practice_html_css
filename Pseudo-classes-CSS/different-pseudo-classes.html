<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="different-pseudo-classes.css">
</head>
<body>
    <!--active-->
    <button>Example Button</button>

    <!--hover-->
    <a href="#">Hover over me!</a>  

    <br><br>
    <!--first-child-->
    <div class="container-first-child">
    <p>first child</p>
    <p>second child</p>
    <p>third child</p>
    <p>last child</p>
    </div>

    <br><br>
    <!--last-child-->
    <div class="container-last-child">
    <p>first child</p>
    <p>second child</p>
    <p>third child</p>
    <p>last child</p>
    </div>

    <!--visited-->
    <a href="https://www.example.com" target="_blank" class="visited-link">Visit Example.com</a>

    <!--disabled-->
    <button disabled class="disabled-button">Disabled Button</button>
    
</body> 
</html>
