<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="list-css-exercises.css"></link>
</head>

<body>

<div class="container">
    <h1>Options</h1>
    
    <ul class="todo-list">

        <li>
            <label for="first-box">1st</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="https://grok.com/" target="_blank">First option</a>
                </li>
            </ul>
            <input type="checkbox" id="first-box">
        </li>

        <li>
            <label for="second-box">2nd</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="https://chatgpt.com/" target="_blank">Second option</a>
                </li>
            </ul>
            <input type="checkbox" id="second-box">
        </li>

        <li>         
            <label for="third-box">3rd</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="https://gemini.google.com/app" target="_blank">
                        Third option
                    </a>
                </li>
            </ul>
            <input type="checkbox" id="third-box">
        </li>

        <li>
            <label for="fourt-box">4th</label>
            <ul class="sub-item">
                <li>
                    <a class="sub-item-link" href="https://www.deepseek.com/en/" target="_blank">Fourt option</a>
                </li>
            </ul>
            <input type="checkbox" id="fourt-box">
        </li>
        
    </ul>
</div>

</body>

</html>
