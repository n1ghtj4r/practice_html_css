<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="examples-ua-pseudoclasses.css">
</head>
<body>
    <!--active-->
    <a href="#">Example link</a>

    <!--hover-->
    <button class="btn">Hover Over Me</button>

    <!--focus-->
    <form>
    <input type="text" />
    </form>

    <!--visited-->
    <a href="https://www.example.com" target="_blank" class="visited-link">Visit Example.com</a>

    <!--checked-->
    <form>
    <label>
    Agree <input class="checkbox" type="checkbox" />
    </label>
    </form>
</body>
</html>
