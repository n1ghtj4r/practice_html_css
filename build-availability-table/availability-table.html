<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Table</title>
    <link rel="stylesheet" href="availability-table.css">
</head>

<body>
    <table>
        <tr class="sharp">
            <th></th>
            <th class="time">10pm</th>
            <th class="time">9pm</th>
            <th class="time">8pm</th>
            <th class="time">7pm</th>
        </tr>
        <tr class="sharp">
            <th class="day">Monday</th>
            <td class="available-3"></td>
            <td class="available-2"></td>
            <td class="available-4"></td>
            <td class="available-5"></td>
        </tr>
        <tr class="sharp">
            <th class="day">Tuesday</th>
            <td class="available-1"></td>
            <td class="available-2"></td>
            <td class="available-3"></td>
            <td class="available-4"></td>
        </tr>
        <tr class="half">
            <th class="day">Wednesday</th>
            <td class="available-3"></td>
            <td class="available-2"></td>
            <td class="available-1"></td>
            <td class="available-4"></td>
        </tr>
        <tr class="sharp">
            <th class="day">Thurday</th>
            <td class="available-4"></td>
            <td class="available-5"></td>
            <td class="available-3"></td>
            <td class="available-1"></td>
        </tr>
        <tr class="sharp">
            <th class="day">Friday</th>
            <td class="available-3"></td>
            <td class="available-4"></td>
            <td class="available-2"></td>
            <td class="available-1"></td>
        </tr>
        <tr class="half">
            <th class="day">Saturday</th>
            <td class="available-5"></td>
            <td class="available-3"></td>
            <td class="available-2"></td>
            <td class="available-2"></td>
        </tr>
        <tr class="half">
            <th class="day">Sunday</th>
            <td class="available-0"></td>
            <td class="available-0"></td>
            <td class="available-0"></td>
            <td class="available-0"></td>
        </tr>
    </table>
    <div id="legend"><span>Availability</span>
    <div id="legend-gradient"></div></div>
</body>

</html>
