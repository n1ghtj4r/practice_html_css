<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Product Landing Page</title>
<link rel="stylesheet" href="product-landing-page.css">
</head>
  
<body>

  <header id="header">

    <div class="logos">
        <img id="header-img" src="https://img.icons8.com/?size=100&id=9G8z6o6H48jS&format=png&color=000000"/>
        <span id="header-name">Ver Website</span>
    </div>
    
    <nav id="nav-bar">
    <ul>
        <li><a class="nav-link" href="#features">Features</a></li>
        <li><a class="nav-link" href="#how-it-works">How It Works</a></li>
        <li><a class="nav-link" href="#pricing">Pricing</a></li>
    </ul>
    </nav>

  </header>

  <main id="main-content">

  <form id="form" action="https://example.com/">
    <div class="form-input">
        <input type="email" id="email" placeholder="Enter your email address" name="email" />
        <input type="submit" id="submit" value="GET STARTED"/>
    </div>
  </form>

  <video
    width="400"
    height="300"
    controls
    src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
    >
    <track
        src="captions.vtt"
        kind="captions"
        srclang="en"
        label="English"
    />
    </video>

  <section id="features">
    <h2>Features Section</h2>
  </section>

  <section id="how-it-works">
    <h2>How it Works Section</h2>
  </section>

  <section id="pricing">
    <h2>Pricing Section</h2>
  </section>

  </main>

  <footer id="footer"> 
    <div class="footer-content">
    <ul>
        <li><a href="" class="footer-link">Privacy</a></li>
        <li><a href="" class="footer-link">Terms</a></li>
        <li><a href="" class="footer-link">Contact</a></li>
    </ul>

    <span>Copyright 2016, Ver Website</span>
    </div>
  </footer>

</body>

</html>
