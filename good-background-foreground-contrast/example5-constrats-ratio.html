<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .contrast-21 {
        background-color: white;
        color: black;
        padding: 15px;
        font-family: sans-serif;
        font-size: 18px;
        margin-bottom: 20px;
    }

    .label {
        font-weight: bold;
        margin-bottom: 8px;
        display: block;
    }

    .purple-on-blue {
        background-color: #0000cc;
        color: #800080; 
        padding: 15px;
        font-family: sans-serif;
        font-size: 18px;
        margin-bottom: 20px;
    }
    </style>
</head>
<body>
    <div class="contrast-21">
    <span class="label">Contrast Ratio 21:1</span>
    This example more than meets the AAA standard with black text on white background.
    </div>

    <div class="purple-on-blue">
    <span class="label">Purple on Blue (Lower Contrast)</span>
    This doesn't meet the AA standard.
    </div>
</body>
</html>
